<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スキル評価チャート</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 15px; 
            max-width: 800px; 
            margin: auto; 
            background-color: #f4f7f6; 
            color: #333;
        }
        .control-panel { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
        }
        .name-input-wrapper { 
            margin-bottom: 20px; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 15px; 
        }
        .name-input-wrapper label { 
            font-weight: bold; 
            display: block; 
            margin-bottom: 8px; 
        }
        #staffName { 
            font-size: 1.2em; 
            padding: 10px; 
            width: 100%; 
            max-width: 400px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            box-sizing: border-box;
        }
        .slider-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 15px; 
        }
        .slider-row label { 
            width: 140px; 
            font-weight: bold; 
            font-size: 0.9em;
        }
        .slider-row input[type="range"] { 
            flex-grow: 1; 
            margin: 0 10px; 
            cursor: pointer; 
        }
        .slider-row span { 
            width: 35px; 
            text-align: right; 
            font-size: 1.1em; 
            font-weight: bold; 
            color: #007bff; 
        }

        @media (max-width: 600px) {
            .slider-row { 
                flex-wrap: wrap; 
                margin-bottom: 20px;
            }
            .slider-row label { 
                width: 100%; 
                margin-bottom: 5px; 
            }
            .slider-row input[type="range"] { 
                margin: 0; 
                width: calc(100% - 50px); 
            }
        }
        
        .chart-container { 
            background: #ffffff; 
            padding: 10px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            position: relative; 
            /* グラフエリアの縦幅をしっかり確保して大きく見せます */
            height: 500px; 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* スマホ向けにグラフエリアの高さも最適化 */
        @media (max-width: 600px) {
            .chart-container {
                height: 400px;
            }
        }

        .btn-download {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 0 auto 30px;
            padding: 15px;
            background-color: #28a745;
            color: white;
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: background-color 0.2s;
        }
        .btn-download:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="name-input-wrapper">
            <label for="staffName">■ 評価対象スタッフ名</label>
            <input type="text" id="staffName" value="スタッフA" placeholder="名前を入力してください">
        </div>
        
        <div id="sliders"></div>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <button class="btn-download" onclick="downloadChart()">グラフを画像として保存</button>
